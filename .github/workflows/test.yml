name: Tests

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Generate lockfile for audit (zero-dependency package, no lockfile committed)
        run: npm install --package-lock-only

      - name: Audit npm dependencies (fail on high/critical only)
        run: npm audit --omit=dev --audit-level=high

      - name: Run tests
        run: npm test
